name: Windows Build

on:
  pull_request:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  LLVM_VERSION: "22.1.0"
  LDC_VERSION: "1.42.0"

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 600

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/LLVM-${{ env.LLVM_VERSION }}-win64.exe"
          Invoke-WebRequest -Uri $url -OutFile "llvm-installer.exe"
          $llvmRoot = Join-Path $env:RUNNER_TEMP "llvm"
          Remove-Item -Recurse -Force $llvmRoot -ErrorAction SilentlyContinue
          $install = Start-Process -FilePath ".\llvm-installer.exe" -ArgumentList @("/S", "/D=$llvmRoot") -Wait -PassThru
          if ($install.ExitCode -ne 0) {
            throw "LLVM installer failed with exit code $($install.ExitCode)."
          }

          $candidates = @(
            (Join-Path $llvmRoot "bin\llvm-config.exe"),
            "C:\Program Files\LLVM\bin\llvm-config.exe",
            "C:\Program Files (x86)\LLVM\bin\llvm-config.exe",
            (Join-Path $env:LOCALAPPDATA "Programs\LLVM\bin\llvm-config.exe")
          )
          $llvmConfig = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $llvmConfig) {
            $searchRoots = @("C:\Program Files", "C:\Program Files (x86)", $env:LOCALAPPDATA, $env:RUNNER_TEMP) | Where-Object { $_ -and (Test-Path $_) }
            $llvmConfig = $searchRoots |
              ForEach-Object { Get-ChildItem -Path $_ -Filter "llvm-config.exe" -File -Recurse -ErrorAction SilentlyContinue } |
              Select-Object -ExpandProperty FullName -First 1
          }
          if (-not $llvmConfig) {
            throw "llvm-config.exe not found after LLVM install."
          }

          $llvmBin = Split-Path -Parent $llvmConfig
          $llvmBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "LLVM_CONFIG=$llvmConfig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Install LDC2 ${{ env.LDC_VERSION }}
        run: |
          $url = "https://github.com/ldc-developers/ldc/releases/download/v${{ env.LDC_VERSION }}/ldc2-${{ env.LDC_VERSION }}-windows-x64.7z"
          Invoke-WebRequest -Uri $url -OutFile "ldc2.7z"
          7z x ldc2.7z -oC:\ldc2
          "C:\ldc2\ldc2-${{ env.LDC_VERSION }}-windows-x64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Verify tool versions
        run: |
          & "$env:LLVM_CONFIG" --version
          ldc2 --version
          cmake --version
        shell: pwsh

      - name: Build bundled SQLite3
        run: |
          cmake -B build-sqlite vendor\sqlite3 -DCMAKE_BUILD_TYPE=Release
          cmake --build build-sqlite --config Release
        shell: pwsh

      - name: Configure CMake
        run: |
          $sqliteLib = (Resolve-Path "build-sqlite\Release\sqlite3.lib").Path
          cmake -B build `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX=C:/dextool_install `
            "-DSQLITE3_LIB=$sqliteLib" `
            -DLOW_MEM=ON
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release
        shell: pwsh

      - name: Install
        run: cmake --install build --config Release
        shell: pwsh
