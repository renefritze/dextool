name: Windows Build

on:
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string
        default: ""
      upload_release_zip:
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  LLVM_VERSION: "22.1.0"
  LDC_VERSION: "1.42.0"

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # needed for git describe to embed the version
          fetch-depth: 0
          fetch-tags: true

      - name: Checkout tagged commit
        if: github.event_name == 'workflow_call' && inputs.release_tag != ''
        run: git checkout "refs/tags/${{ inputs.release_tag }}"
        shell: pwsh

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:\llvm
          key: llvm-${{ env.LLVM_VERSION }}-x86_64-pc-windows-msvc

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          # The clang+llvm archive (unlike the LLVM-*-win64.exe installer)
          # ships llvm-config.exe, the clang C++ headers and the static libs
          # that dextool needs.
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-x86_64-pc-windows-msvc.tar.xz"
          Invoke-WebRequest -Uri $url -OutFile "llvm.tar.xz"
          New-Item -ItemType Directory -Force -Path C:\llvm | Out-Null
          tar -xf llvm.tar.xz -C C:\llvm --strip-components=1
          Remove-Item llvm.tar.xz
        shell: pwsh

      - name: Add LLVM to PATH
        run: |
          if (-not (Test-Path "C:\llvm\bin\llvm-config.exe")) {
            throw "llvm-config.exe not found in C:\llvm\bin"
          }
          "C:\llvm\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Cache LDC
        id: cache-ldc
        uses: actions/cache@v4
        with:
          path: C:\ldc2
          key: ldc2-${{ env.LDC_VERSION }}-windows-x64

      - name: Install LDC2 ${{ env.LDC_VERSION }}
        if: steps.cache-ldc.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/ldc-developers/ldc/releases/download/v${{ env.LDC_VERSION }}/ldc2-${{ env.LDC_VERSION }}-windows-x64.7z"
          Invoke-WebRequest -Uri $url -OutFile "ldc2.7z"
          7z x ldc2.7z -oC:\ldc2
          Remove-Item ldc2.7z
        shell: pwsh

      - name: Add LDC to PATH
        run: |
          "C:\ldc2\ldc2-${{ env.LDC_VERSION }}-windows-x64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Verify tool versions
        run: |
          llvm-config --version
          llvm-config --libdir
          ldmd2 --version
          cmake --version
          ninja --version
        shell: pwsh

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_INSTALL_PREFIX=C:/dextool_install `
            -DLOW_MEM=ON
        shell: pwsh

      - name: Build
        # low parallelism to keep the peak memory of the D compiler within
        # the runner's 16 GB when compiling dextool-mutate
        run: cmake --build build -j 2
        shell: pwsh

      - name: Smoke test
        run: |
          & build\dextool.exe --version
          if ($LASTEXITCODE -ne 0) { throw "dextool --version failed" }
          $plugins = & build\dextool.exe --plugin-list | Out-String
          Write-Host $plugins
          if ($plugins -notmatch "mutate") { throw "mutate plugin not discovered" }
          & build\dextool.exe mutate analyze --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "mutate analyze --help failed" }
        shell: pwsh

      - name: End to end mutate smoke test
        run: |
          New-Item -ItemType Directory -Force -Path smoke\src | Out-Null
          Set-Content smoke\src\fn.cpp "int fn(int x) { return x + 1; }"
          Set-Content smoke\src\main.cpp "int fn(int x);`nint main() { return fn(1) == 2 ? 0 : 1; }"
          Set-Content smoke\CMakeLists.txt "cmake_minimum_required(VERSION 3.10)`nproject(smoke CXX)`nadd_executable(smoke src/fn.cpp src/main.cpp)"
          cmake -S smoke -B smoke\build -G Ninja -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -DCMAKE_CXX_COMPILER=clang++
          if ($LASTEXITCODE -ne 0) { throw "smoke project configure failed" }
          Push-Location smoke
          & ..\build\dextool.exe mutate analyze --compile-db build\compile_commands.json --out .
          if ($LASTEXITCODE -ne 0) { throw "mutate analyze failed" }
          if (-not (Test-Path dextool_mutate.sqlite3)) { throw "analyze produced no database" }
          & ..\build\dextool.exe mutate report --style plain --out .
          if ($LASTEXITCODE -ne 0) { throw "mutate report failed" }
          Pop-Location
        shell: pwsh

      - name: Install
        run: cmake --install build
        shell: pwsh

      - name: Verify artifact is self-contained
        # Extract the install tree to a fresh location and run an end to end
        # mutate analyze/report from it with the LLVM (and LDC) directories
        # removed from PATH. This reproduces exactly what a user does after
        # downloading the artifact and fails if libclang.dll (or any other
        # runtime dependency) is not shipped inside the archive.
        run: |
          if (-not (Test-Path C:/dextool_install/bin/libclang.dll)) {
            throw "libclang.dll was not installed into the artifact"
          }

          # simulate downloading and extracting the artifact somewhere else
          $extracted = "C:\extracted"
          Copy-Item -Recurse -Force C:/dextool_install $extracted

          # drop the toolchain directories so the binaries can only resolve
          # their runtime dependencies from next to themselves
          $clean = ($env:PATH -split ';' | Where-Object {
            $_ -and ($_ -notlike '*\llvm\*') -and ($_ -notlike '*\ldc2\*')
          }) -join ';'
          $env:PATH = $clean

          $dextool = "$extracted\bin\dextool.exe"
          & $dextool --version
          if ($LASTEXITCODE -ne 0) { throw "extracted dextool --version failed" }
          $plugins = & $dextool --plugin-list | Out-String
          if ($plugins -notmatch "mutate") { throw "mutate plugin not discovered in extracted tree" }

          # reuse the compile database produced by the earlier smoke test and
          # run a real analyze + report through the extracted mutate binary
          New-Item -ItemType Directory -Force -Path selfcontained | Out-Null
          Push-Location selfcontained
          & $dextool mutate analyze --compile-db ..\smoke\build\compile_commands.json --out .
          if ($LASTEXITCODE -ne 0) { throw "extracted mutate analyze failed (missing runtime dependency?)" }
          if (-not (Test-Path dextool_mutate.sqlite3)) { throw "extracted analyze produced no database" }
          & $dextool mutate report --style plain --out .
          if ($LASTEXITCODE -ne 0) { throw "extracted mutate report failed" }
          Pop-Location
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dextool-windows-x64
          path: C:/dextool_install

      - name: Create release zip
        if: github.event_name == 'workflow_call' && inputs.upload_release_zip
        run: |
          $zip = "dextool-windows-x64-${{ inputs.release_tag }}.zip"
          Compress-Archive -Path C:\dextool_install\* -DestinationPath $zip
        shell: pwsh

      - name: Upload release zip artifact
        if: github.event_name == 'workflow_call' && inputs.upload_release_zip
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-zip
          path: dextool-windows-x64-${{ inputs.release_tag }}.zip
