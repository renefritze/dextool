name: Tag Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-tagging

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute and push next tag
        run: |
          set -euo pipefail

          latest=$(git tag -l 'v0.0.*' | sed -E 's/^v0\.0\.//' | sort -n | tail -1)
          next=$(( ${latest:-0} + 1 ))
          tag="v0.0.${next}"

          echo "Next tag: ${tag}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
