name: Release

on:
  push:
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-master

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.compute-tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute and push next tag
        id: compute-tag
        run: |
          set -euo pipefail

          existing="$(git tag --points-at HEAD -l 'v0.0.*' | sort -V | tail -1)"
          if [ -n "${existing}" ]; then
            tag="${existing}"
            echo "Using existing tag for HEAD: ${tag}"
            echo "tag=${tag}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          latest="$(git tag -l 'v0.0.*' | sed -E 's/^v0\.0\.//' | sort -n | tail -1)"
          next=$(( ${latest:-0} + 1 ))
          tag="v0.0.${next}"

          echo "Next tag: ${tag}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${tag}" -m "Release ${tag}"
          git push origin "${tag}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

  windows-build:
    needs: tag
    runs-on: windows-2025
    timeout-minutes: 360
    env:
      LLVM_VERSION: "22.1.0"
      LDC_VERSION: "1.42.0"
      RELEASE_TAG: ${{ needs.tag.outputs.tag }}
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}
          fetch-depth: 0
          fetch-tags: true

      - name: Cache LLVM
        id: cache-llvm
        uses: actions/cache@v4
        with:
          path: C:\llvm
          key: llvm-${{ env.LLVM_VERSION }}-x86_64-pc-windows-msvc

      - name: Install LLVM ${{ env.LLVM_VERSION }}
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ env.LLVM_VERSION }}/clang+llvm-${{ env.LLVM_VERSION }}-x86_64-pc-windows-msvc.tar.xz"
          Invoke-WebRequest -Uri $url -OutFile "llvm.tar.xz"
          New-Item -ItemType Directory -Force -Path C:\llvm | Out-Null
          tar -xf llvm.tar.xz -C C:\llvm --strip-components=1
          Remove-Item llvm.tar.xz
        shell: pwsh

      - name: Add LLVM to PATH
        run: |
          if (-not (Test-Path "C:\llvm\bin\llvm-config.exe")) {
            throw "llvm-config.exe not found in C:\llvm\bin"
          }
          "C:\llvm\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Cache LDC
        id: cache-ldc
        uses: actions/cache@v4
        with:
          path: C:\ldc2
          key: ldc2-${{ env.LDC_VERSION }}-windows-x64

      - name: Install LDC2 ${{ env.LDC_VERSION }}
        if: steps.cache-ldc.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/ldc-developers/ldc/releases/download/v${{ env.LDC_VERSION }}/ldc2-${{ env.LDC_VERSION }}-windows-x64.7z"
          Invoke-WebRequest -Uri $url -OutFile "ldc2.7z"
          7z x ldc2.7z -oC:\ldc2
          Remove-Item ldc2.7z
        shell: pwsh

      - name: Add LDC to PATH
        run: |
          "C:\ldc2\ldc2-${{ env.LDC_VERSION }}-windows-x64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        shell: pwsh

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        run: |
          cmake -B build -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_INSTALL_PREFIX=C:/dextool_install `
            -DLOW_MEM=ON
        shell: pwsh

      - name: Build
        run: cmake --build build -j 2
        shell: pwsh

      - name: Install
        run: cmake --install build
        shell: pwsh

      - name: Create release zip
        run: |
          $zip = "dextool-windows-x64-${{ env.RELEASE_TAG }}.zip"
          Compress-Archive -Path C:\dextool_install\* -DestinationPath $zip
        shell: pwsh

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-zip
          path: dextool-windows-x64-${{ env.RELEASE_TAG }}.zip

  create-release:
    needs: [tag, windows-build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release zip
        uses: actions/download-artifact@v4
        with:
          name: release-windows-zip

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.tag.outputs.tag }}
        run: |
          set -euo pipefail
          zip="dextool-windows-x64-${TAG}.zip"

          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release upload "${TAG}" "${zip}" --clobber
          else
            gh release create "${TAG}" "${zip}" --title "${TAG}" --notes "Automated release for ${TAG}"
          fi
